<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>glocean</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #191724;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .center {
      text-align: center;
      
      z-index: 10;
      position: relative;
    }

    .center h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(62px, 9.5vw, 120px);
      font-weight: 600;
      color: #e0def4;
      letter-spacing: 0.12em;
      margin-bottom: 28px;
    }

    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .links a {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 1.85vw, 22px);
      font-weight: 400;
      color: #b8b4d0;
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.25s ease;
    }

    .links a:hover {
      color: #e0def4;
    }

    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #c8c5de;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="scene">
    <canvas id="c"></canvas>
    <div class="center">
      <h1>glocean</h1>
      <div class="links">
        <a href="/about">about</a>
        <div class="dot"></div>
        <a href="/blog">blog</a>
        <div class="dot"></div>
        <a href="/garden">garden</a>
        <div class="dot"></div>
        <a href="/projects">projects</a>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const COLORS = ['#eb6f92','#f6c177','#ebbcba','#31748f','#9ccfd8','#c4a7e7'];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    class Flower {
      constructor(corner, numPetals, colorOffset = 0) {
        this.corner = corner;
        this.numPetals = numPetals;
        this.colorOffset = colorOffset;
        this.petalLength = Math.min(window.innerWidth, window.innerHeight) * 0.46;
        this.progress = 0;
        this.rotation = 0;
        this.spinSpeed = 0.0013;
        this.unravelSpeed = 0.003;
        this.unraveling = true;
        this.startAngle = -Math.PI / 2;
        this.angleOffset = corner === 'br' ? Math.PI : 0;
      }

      getPos() {
        if (this.corner === 'tl') return [-10, -10];
        return [window.innerWidth + 10, window.innerHeight + 10];
      }

      drawPetal(cx, cy, angle, color) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);

        const pl = this.petalLength;
        const pw = pl * 0.22;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-pw, -pl * 0.3, -pw * 0.4, -pl * 0.75, 0, -pl);
        ctx.bezierCurveTo(pw * 0.4, -pl * 0.75, pw, -pl * 0.3, 0, 0);

        ctx.fillStyle = color;
        ctx.globalAlpha = 0.88;
        ctx.fill();
        ctx.restore();
      }

      update() {
        if (this.unraveling) {
          this.progress = Math.min(1, this.progress + this.unravelSpeed);
          if (this.progress >= 1) this.unraveling = false;
        }
        this.rotation += this.spinSpeed;
      }

      draw() {
        const [cx, cy] = this.getPos();
        const easedProgress = easeOut(this.progress);

        for (let i = 0; i < this.numPetals; i++) {
          const finalAngle = (i / this.numPetals) * Math.PI * 2;
          const angle = this.startAngle + (finalAngle - this.startAngle) * easedProgress + this.rotation + this.angleOffset;
          const color = COLORS[(i + this.colorOffset) % COLORS.length];
          this.drawPetal(cx, cy, angle, color);
        }

        ctx.save();
        ctx.translate(cx, cy);
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#191724';
        ctx.globalAlpha = 1;
        ctx.fill();
        ctx.restore();
      }
    }

    const flowers = [
      new Flower('tl', 10, 0),
      new Flower('br', 10, 3)
    ];

    window.addEventListener('resize', () => {
      flowers.forEach(f => {
        f.petalLength = Math.min(window.innerWidth, window.innerHeight) * 0.46;
      });
    });

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
      flowers.forEach(f => { f.update(); f.draw(); });
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
